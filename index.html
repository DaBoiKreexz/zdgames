<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcade Hub</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Inter", sans-serif;
      background: linear-gradient(135deg, #1b2735, #090a0f);
      color: white;
      overflow-x: hidden;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      text-align: center;
    }

    .hero h1 {
      font-size: 4rem;
      margin: 0;
      letter-spacing: 2px;
    }

    .hero p {
      font-size: 1.3rem;
      opacity: 0.8;
      margin-top: 8px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .game-card {
      background: #22242b;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      transition: 0.3s ease;
      cursor: pointer;
    }

    .game-card:hover {
      transform: scale(1.07);
      background: #2a2d38;
    }

    .game-card a {
      text-decoration: none;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>stupid game site</h1>
    <p>by: Kieran</p>
  </div>

  <div class="game-grid">
    <div class="game-card"><a href="amanda-the-adventurer/">Amanda</a></div>
    <div class="game-card"><a href="baldi-plus/">Baldi Plus</a></div>
    <div class="game-card"><a href="omori-fixed/">OMORI</a></div>
    <div class="game-card"><a href="hotline-miami/">Hotline Miami</a></div>
    <div class="game-card"><a href="yandere-sim/">Yandere Simulator</a></div>
    <!-- Add more cards here -->
  </div>

</body>
</html>
