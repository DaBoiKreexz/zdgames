<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education IXL</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  font-family: "Inter", sans-serif;
  background: linear-gradient(135deg, #1b2735, #090a0f);
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 10;
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

nav button:hover {
  color: #38bdf8;
}

/* SECTIONS */
.section {
  display: none;
}

.active {
  display: block;
}

/* HERO */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  text-align: center;
}

.hero h1 {
  font-size: 4rem;
  margin: 0;
  letter-spacing: 2px;
}

.hero p {
  font-size: 1.3rem;
  opacity: 0.8;
  margin-top: 8px;
}

/* GRID */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 24px;
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 20px;
}

.game-card {
  background: #22242b;
  border-radius: 12px;
  padding: 18px;
  text-align: center;
  transition: 0.3s ease;
  cursor: pointer;
}

.game-card:hover {
  transform: scale(1.07);
  background: #2a2d38;
}

.game-card a {
  text-decoration: none;
  color: #fff;
  font-size: 1.1rem;
  font-weight: 600;
}

/* SETTINGS */
.settings-panel {
  text-align: center;
  padding: 40px;
}

.settings-panel button {
  margin: 10px;
  padding: 10px 20px;
  background: #22242b;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.settings-panel button:hover {
  background: #2a2d38;
}

/* SNOW CANVAS */
#snow {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: -1;
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<nav>
  <button onclick="showTab('home')">Home</button>
  <button onclick="showTab('games')">Games</button>
  <button onclick="showTab('apps')">Apps</button>
  <button onclick="showTab('settings')">Settings</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <h1>stupid game site ❄️</h1>
    <p>by: Kieran</p>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="section">
  <div class="game-grid">
    <div class="game-card"><a href="amanda-the-adventurer/">Amanda</a></div>
    <div class="game-card"><a href="play.html?game=baldi-plus">Baldi Plus</a>
    <div class="game-card"><a href="omori-fixed/">OMORI</a></div>
    <div class="game-card"><a href="hotline-miami/">Hotline Miami</a></div>
    <div class="game-card"><a href="play.html?game=yandere-sim">Yandere Simulator</a>    
  </div>
</div>

<!-- APPS -->
<div id="apps" class="section">
  <div class="hero">
    <h1>Apps</h1>
    <p>Coming soon 👀</p>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="section">
  <div class="settings-panel">
    <h1>Settings</h1>
    <button onclick="toggleSnow()">Toggle Snow</button>
    <button onclick="renameTab()">Rename Tab Title</button>
  </div>
</div>

<script>
function showTab(tab) {
  document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}

/* Title rename */
function renameTab() {
  let name = prompt("Enter new tab title:");
  if (name) document.title = name;
}

/* Snow animation */
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let flakes = [];
let snowEnabled = true;

for (let i = 0; i < 150; i++) {
  flakes.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 3 + 1,
    d: Math.random()
  });
}

function drawSnow() {
  if (!snowEnabled) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    requestAnimationFrame(drawSnow);
    return;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";
  ctx.beginPath();

  for (let i = 0; i < flakes.length; i++) {
    let f = flakes[i];
    ctx.moveTo(f.x, f.y);
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
  }

  ctx.fill();
  moveSnow();
  requestAnimationFrame(drawSnow);
}

let angle = 0;

function moveSnow() {
  angle += 0.01;
  for (let i = 0; i < flakes.length; i++) {
    let f = flakes[i];
    f.y += Math.pow(f.d, 2) + 1;
    f.x += Math.sin(angle) * 2;

    if (f.y > canvas.height) {
      flakes[i] = {
        x: Math.random() * canvas.width,
        y: 0,
        r: f.r,
        d: f.d
      };
    }
  }
}

function toggleSnow() {
  snowEnabled = !snowEnabled;
}

drawSnow();
</script>

</body>
</html>
