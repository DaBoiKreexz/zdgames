<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Player</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #1b2735, #090a0f);
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Top Bar */
.top-bar {
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.top-bar a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  margin-left: 20px;
}

.controls {
  margin-right: 20px;
}

.controls button {
  background: #22242b;
  border: none;
  color: white;
  padding: 8px 14px;
  margin-left: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.controls button:hover {
  background: #2a2d38;
}

/* Game Window */
.game-wrapper {
  margin-top: 40px;
  background: #111;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

iframe {
  width: 1100px;
  height: 650px;
  border: none;
  border-radius: 10px;
  background: black;
}

@media (max-width: 1200px) {
  iframe {
    width: 90vw;
    height: 55vw;
  }
}
</style>
</head>

<body>

<div class="top-bar">
  <a href="index.html">← Back to Arcade</a>
  <div class="controls">
    <button onclick="toggleFullscreen()">Fullscreen</button>
  </div>
</div>

<div class="game-wrapper">
  <iframe id="gameFrame"></iframe>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const game = params.get("game");

if (game) {
  document.getElementById("gameFrame").src = game + "/index.html";
  document.title = game.replace(/-/g, " ");
} else {
  document.body.innerHTML = "<h1>No game specified</h1>";
}

/* Fullscreen toggle */
function toggleFullscreen() {
  const frame = document.getElementById("gameFrame");

  if (!document.fullscreenElement) {
    frame.requestFullscreen().catch(err => {
      alert("Fullscreen not allowed.");
    });
  } else {
    document.exitFullscreen();
  }
}
</script>

</body>
</html>
